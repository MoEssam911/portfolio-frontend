name: CI/CD Pipeline

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.15]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
    strategy:
      matrix:
        node-version: [24.15]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Select Netlify site
        shell: bash
        run: |
          case "$GITHUB_REF_NAME" in
            main)
              echo "NETLIFY_SITE_ID=${{ secrets.NETLIFY_SITE_ID_PROD }}" >> $GITHUB_ENV
              ;;
            develop)
              echo "NETLIFY_SITE_ID=${{ secrets.NETLIFY_SITE_ID_DEV }}" >> $GITHUB_ENV
              ;;
          esac

      - name: Build
        run: npm run build

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: npx netlify deploy --dir=dist --functions=.netlify/functions-internal --prod --site "$NETLIFY_SITE_ID" --message "${GITHUB_REF_NAME} deploy from GitHub Actions"
